<div class="timer-container">
  <h1>Pomodoro Timer</h1>
  <div class="timer-display">
    <span class="timer">25:00</span>
  </div>
  <div class="timer-controls">
    <button aria-label="Időzítő indítása" mat-button>
      <mat-icon class="icon">play_circle_outline</mat-icon>
    </button>
    <button aria-label="Időzítő leállítása" mat-button>
      <mat-icon class="icon">pause_circle_outline</mat-icon>
    </button>
  </div>
</div>
