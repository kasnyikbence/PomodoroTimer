<app-background-component></app-background-component>
<app-navbar-component></app-navbar-component>

<div class="timer-container">
  <div class="durations-wrapper">
        <div class="form-check">
            <input class="form-check-input" type="radio" name="timerType" id="focusRadio" value="focus" checked="" (change)="phaseSelection($event)">
            <label class="form-check-label" for="focusRadio">
                focus
            </label>
        </div>
        <div class="form-check">
            <input class="form-check-input" type="radio" name="timerType" id="shortBreakRadio" value="short" (change)="phaseSelection($event)">
            <label class="form-check-label" for="shortBreakRadio">
                short break
            </label>
        </div>
        <div class="form-check">
            <input class="form-check-input" type="radio" name="timerType" id="longBreakRadio" value="long" (change)="phaseSelection($event)">
            <label class="form-check-label" for="longBreakRadio">
                long break
            </label>
        </div>
    </div>
  <div class="timer-display">
    <span class="timer">{{ formatTime(timeLeft()) }}</span>
  </div>
  <div class="timer-controls">
    <button class="btn start-btn" (click)="startTimer()">
      <span class="" id="play-icon">{{startText}}</span>
    </button>
  </div>
</div>
